server {
    listen 9000;
    server_name localhost;

    root /var/www/html;
    index index.html index.htm;

    # Serve the front-end under /softy-pinko-front-end/
    location /softy-pinko-front-end/ {
        try_files $uri $uri/ /softy-pinko-front-end/index.html;
    }

    # Also serve the front-end at the root URL
    location = / {
        try_files /softy-pinko-front-end/index.html =404;
    }
}
