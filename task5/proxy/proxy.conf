server {
    listen 80;
    server_name localhost;

    # Route API calls to the back-end service
    location /api/ {
        proxy_pass http://back-end:5252/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route all other requests to the front-end service (served under /softy-pinko-front-end)
    location / {
        proxy_pass http://front-end:9000/softy-pinko-front-end/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
